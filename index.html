<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Simple avec CSS et Memes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        p {
            font-size: 24px;
            color: #333;
            text-align: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .memes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .memes img {
            max-width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <p>khouna li ja dik nahar baydwi f3mti nzha houwa lmn taychbh hhh</p>
    <div class="memes">
        <img src="https://i.imgur.com/EXAMPLE1.jpg" alt="Meme 1">
        <img src="https://i.imgur.com/EXAMPLE2.jpg" alt="Meme 2">
        <img src="https://i.imgur.com/EXAMPLE3.jpg" alt="Meme 3">
    </div>
</body>
</html>
